<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiefs Quiz</title>
    <link rel="stylesheet" href="blue.css">
</head>
<body>
<div id="menu-backdrop" class="backdrop" onclick="toggleNav()"></div>
    <div id="side-nav" class="side-nav">
        <div class="nav-content">
            <h3>Menu</h3>
            <button class="nav-btn" onclick="setTheme('light')">☀️ Light Mode</button>
            <button class="nav-btn" onclick="setTheme('dark')">🌙 Dark Mode</button>
            <hr>
            <button class="nav-btn" onclick="location.reload()">🏠 Home</button>
        </div>
    </div>
<header>
    <div class="menu-btn" onclick="toggleNav()">
        <span></span><span></span><span></span>
    </div>
    
    <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 10 L90 25 L90 55 Q90 85 50 95 Q10 85 10 55 L10 25 Z" 
          fill="none" stroke="white" stroke-width="6"/>
    <path d="M35 40 L65 40 L65 70 L35 70 Z" fill="white"/>
    <path d="M50 40 L50 70" stroke="#034694" stroke-width="3"/>
</svg>

        <h1 id="course-title">Weng <span>De Chief</span></h1>
    </div>

    <div id="score-box">Score: <span id="score-display">0</span></div>
</header>


    <main>
        <div id="start-container" class="card">
            <h2>Select Course</h2>
            <button class="main-btn" onclick="selectCourse('COS101')">COS 101</button>
            <button class="main-btn" onclick="selectCourse('PHY101')">PHY 101</button>
            <button class="main-btn" 
             onClick="selectCourse
             ('BIO102')">BIO 102</button>
            <button class="main-btn" 
             onClick="selectCourse
             ('CHEM102')">CHEM 102</button>
             <button class="main-btn"
              onClick="selectCourse
              ('PHY102')">PHY 102</button>
            <button class="main-btn"
             onClick="selectCourse
             ('MATHS102')">MATHS 102</button>
        </div>

        <div id="quiz-container" class="card hidden">
            <p id="question-number">Question 1/10</p>
            <h2 id="question-text">Loading...</h2>
            <div id="answer-grid"></div>
            
            <div class="nav-controls">
                <button id="back-btn" class="nav-btn" onclick="goBack()">Back</button>
                <button id="next-btn" class="nav-btn" onclick="goNext()">Next</button>
            </div>
        </div>

        <div id="result-container" class="card hidden">
            <h2>Quiz Complete!</h2>
            <h1 id="final-score">0/10</h1>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
